# Kindle Sender Bot — Nginx reverse proxy
# Install:
#   cp deploy/nginx/kindle_bot.conf /etc/nginx/sites-available/
#   ln -s /etc/nginx/sites-available/kindle_bot.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# HTTP: serve ACME challenges (issuance + auto-renewal), redirect everything else.
server {
    listen 80;
    server_name amerikadan.uz;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name amerikadan.uz;

    # Issued by: certbot --nginx -d amerikadan.uz
    ssl_certificate     /etc/letsencrypt/live/amerikadan.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/amerikadan.uz/privkey.pem;

    # Telegram posts to https://amerikadan.uz/tg/<secret>.
    # Only the /tg/ prefix is here on purpose — the exact secret path lives in
    # .env (WEBHOOK_PATH) so it stays out of version control. The bot returns
    # 404 for any /tg/* that isn't the real path, and additionally validates the
    # X-Telegram-Bot-Api-Secret-Token header (WEBHOOK_SECRET).
    location /tg/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        client_max_body_size 1M;   # webhook payloads are small JSON
    }
}
