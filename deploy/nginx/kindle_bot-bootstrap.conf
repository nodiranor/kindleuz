# Kindle Sender Bot — BOOTSTRAP Nginx config (HTTP only, no TLS).
# Use this ONLY to obtain the first certificate, then switch to kindle_bot.conf.
# It references no cert files, so `nginx -t` passes before any cert exists.
#
#   cp deploy/nginx/kindle_bot-bootstrap.conf /etc/nginx/sites-available/kindle_bot.conf
#   ln -sf /etc/nginx/sites-available/kindle_bot.conf /etc/nginx/sites-enabled/
#   mkdir -p /var/www/certbot
#   nginx -t && systemctl reload nginx
#   certbot certonly --webroot -w /var/www/certbot -d amerikadan.uz

server {
    listen 80;
    server_name amerikadan.uz;

    # Lets Certbot's webroot challenge succeed.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Optional: lets the bot work over HTTP for a quick test before TLS is on.
    location /tg/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        client_max_body_size 1M;
    }

    location / { return 404; }
}
